navigation = "2.9.3"
gson = "2.13.1"
kotlinx-coroutines = "1.10.2"
mockito-kotlin = "6.3.0"
hilt = "2.57"                # Latest as of Aug 2025
hilt_compiler = "2.57"
androidx_hilt_navigation = "1.2.0"
